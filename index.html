<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Marketplace</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #0f1115;
            color: white;
        }

        header {
            background-color: #1a1d24;
            padding: 20px;
            border-bottom: 2px solid #ff6b00;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            color: #ff6b00;
            margin-bottom: 20px;
        }

        .search-box {
            width: 100%;
            max-width: 600px;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #2d313a;
            background-color: #0f1115;
            color: white;
            font-size: 16px;
            margin-bottom: 30px;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .product-card {
            background-color: #1a1d24;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #2d313a;
            transition: transform 0.3s;
        }

        .product-card:hover {
            transform: translateY(-5px);
            border-color: #ff6b00;
        }

        .product-image {
            width: 100%;
            height: 200px;
            background-color: #2d313a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }

        .product-info {
            padding: 15px;
        }

        .product-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .price {
            color: #ff6b00;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .old-price {
            text-decoration: line-through;
            color: #888;
            font-size: 14px;
            margin-right: 10px;
        }

        .buy-btn {
            width: 100%;
            padding: 12px;
            background-color: #ff6b00;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }

        .buy-btn:hover {
            background-color: #e65c00;
        }

        .discount {
            background-color: #00d084;
            color: black;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>🎮 GameKey Market</h1>
            <input type="text" class="search-box" placeholder="Search for games..." id="searchBox">
        </div>
    </header>

    <div class="container">
        <h2>🔥 Hot Deals</h2>
        <br>
        <div class="products" id="productList">
            <div class="product-card">
                <div class="product-image">🎮</div>
                <div class="product-info">
                    <span class="discount">-50%</span>
                    <div class="product-title">Elden Ring</div>
                    <div class="price">
                        <span class="old-price">$59.99</span>
                        $29.99
                    </div>
                    <button class="buy-btn" onclick="addToCart()">Add to Cart</button>
                </div>
            </div>

            <div class="product-card">
                <div class="product-image">⚽</div>
                <div class="product-info">
                    <span class="discount">-40%</span>
                    <div class="product-title">FC 24 (FIFA)</div>
                    <div class="price">
                        <span class="old-price">$69.99</span>
                        $41.99
                    </div>
                    <button class="buy-btn" onclick="addToCart()">Add to Cart</button>
                </div>
            </div>

            <div class="product-card">
                <div class="product-image">🚗</div>
                <div class="product-info">
                    <span class="discount">-50%</span>
                    <div class="product-title">GTA V Premium</div>
                    <div class="price">
                        <span class="old-price">$29.99</span>
                        $14.99
                    </div>
                    <button class="buy-btn" onclick="addToCart()">Add to Cart</button>
                </div>
            </div>

            <div class="product-card">
                <div class="product-image">🗡️</div>
                <div class="product-info">
                    <span class="discount">-30%</span>
                    <div class="product-title">God of War</div>
                    <div class="price">
                        <span class="old-price">$49.99</span>
                        $34.99
                    </div>
                    <button class="buy-btn" onclick="addToCart()">Add to Cart</button>
                </div>
            </div>

            <div class="product-card">
                <div class="product-image">🤖</div>
                <div class="product-info">
                    <span class="discount">-50%</span>
                    <div class="product-title">Cyberpunk 2077</div>
                    <div class="price">
                        <span class="old-price">$59.99</span>
                        $29.99
                    </div>
                    <button class="buy-btn" onclick="addToCart()">Add to Cart</button>
                </div>
            </div>

            <div class="product-card">
                <div class="product-image">⛏️</div>
                <div class="product-info">
                    <span class="discount">-25%</span>
                    <div class="product-title">Minecraft</div>
                    <div class="price">
                        <span class="old-price">$26.95</span>
                        $20.21
                    </div>
                    <button class="buy-btn" onclick="addToCart()">Add to Cart</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let cartCount = 0;

        function addToCart() {
            cartCount++;
            alert('Added to cart! Total items: ' + cartCount);
        }

        document.getElementById('searchBox').addEventListener('input', function(e) {
            const searchTerm = e.target.value.toLowerCase();
            const cards = document.querySelectorAll('.product-card');
            
            cards.forEach(card => {
                const title = card.querySelector('.product-title').textContent.toLowerCase();
                if (title.includes(searchTerm)) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
